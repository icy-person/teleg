name: archive

on:
 workflow_dispatch:
   inputs:
     url:
       description: page url
       required: true

jobs:

 run:

   runs-on: ubuntu-latest

   steps:

   - uses: actions/checkout@v4

   - uses: actions/setup-node@v4
     with:
       node-version: 20
  
   - run: npm init -y
   - run: npm install playwright

   - run: npx playwright install chromium
   
   - name: render
     run: node scripts/render.js "${{ github.event.inputs.url }}"

   - uses: actions-rs/toolchain@v1
     with:
       toolchain: stable

   - run: cargo build --release

   - name: generate
     run: ./target/release/archiver

   - name: commit
     run: |
       git config user.name github-actions
       git config user.email actions@github.com
       git add archive
       git commit -m "archive ${{ github.event.inputs.url }}" || echo "no changes"
       git push
